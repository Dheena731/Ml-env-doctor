site_name: mlenvdoctor
site_description: "ML Environment Diagnostics - 47+ checks in 12 seconds"
site_url: https://dheena731.github.io/Ml-env-doctor/
repo_url: https://github.com/Dheena731/Ml-env-doctor
edit_uri: edit/master/docs/

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - offline
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/main/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Dheena731/Ml-env-doctor
  generator: false

extra_javascript:
  - assets/javascripts/structured-data.js

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Usage: usage.md
  - Guides:
      - Diagnose and Doctor: guides/diagnose-and-doctor.md
      - Fix Workflow: guides/fix-workflow.md
      - Reports and Exports: guides/reports-and-exports.md
      - Dockerize: guides/dockerize.md
      - MCP Integration: guides/mcp.md
  - Checks: checks.md
  - Reference:
      - CLI: reference/cli.md
      - JSON Schema: reference/json-schema.md
      - Mismatch Codes: reference/mismatch-codes.md
      - Python API: api/index.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - Contributing:
      - Contributor Guide: contributing.md
      - Dependency Maintenance: dependency-maintenance.md
  - Changelog: changelog.md
